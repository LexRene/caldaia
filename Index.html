<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Caldaia</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- MQTT CORRETTO -->
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body {
  font-family: Arial;
  color:white;
  text-align:center;
  margin:0;
  background-image:url('sfondo.jpg');
  background-size:cover;
}

.overlay {
  background:rgba(0,0,0,0.6);
  min-height:100vh;
  padding-top:20px;
}

.card {
  background:rgba(52,73,94,0.9);
  padding:15px;
  margin:10px;
  border-radius:10px;
}

.value { font-size:28px; font-weight:bold; }

.alta{color:#e74c3c;}
.bassa{color:#3498db;}

.on{color:#2ecc71;}
.off{color:#e74c3c;}

.soglia-on{color:#3498db;font-weight:bold;}
.soglia-off{color:#e74c3c;font-weight:bold;}

.wifi-ok{color:#2ecc71;font-weight:bold;}
.wifi-off{color:#e74c3c;font-weight:bold;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" style="position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:flex;justify-content:center;align-items:center;">
<div>
<h2>Login</h2>
<input id="user"><br><br>
<input id="pass" type="password"><br><br>
<button onclick="login()">Entra</button>
</div>
</div>

<div class="overlay">

<h2>Caldaia</h2>

<div id="clock"></div>
<div id="wifi">--</div>

<div class="card">
<div class="bassa">Temperatura Bassa</div>
<div id="bassa" class="value bassa">--</div>
</div>

<div class="card">
<div class="alta">Temperatura Alta</div>
<div id="alta" class="value alta">--</div>
</div>

<div class="card">
<div>Caldaia</div>
<div id="caldaia" class="value">--</div>
</div>

<div class="card">
<div class="soglia-on">Soglia ON</div>
<input id="on" type="number">

<div class="soglia-off">Soglia OFF</div>
<input id="off" type="number">

<br>
<button onclick="invia()">Aggiorna</button>

<div id="msg" style="margin-top:8px;font-weight:bold;"></div>
</div>

</div>

<script>

const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbx0MI_Qtr2WsYNVxogjcOJ8CQwOdm58Us7RbijPLWl2_lHwDqSnMjV2JclXBZHIk9T2Hw/exec";

let init=false;
let last=Date.now();

/* LOGIN */
function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u=="admin" && p=="Rene1979"){
document.getElementById("loginBox").style.display="none";
logSistema("accesso",u);
}else alert("Credenziali errate");
}

/* LOG GOOGLE */
function logSistema(tipo,valore=""){
fetch(URL_SCRIPT,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
tipo: tipo,
user: valore,
msg: valore
})
});
}

/* MQTT */
const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');

client.on('connect',()=>{
client.subscribe('casa/caldera/dati');
});

client.on('message',(t,m)=>{

last=Date.now();

let d=JSON.parse(m.toString());

document.getElementById("bassa").innerHTML=d.bassa+" °C";
document.getElementById("alta").innerHTML=d.alta+" °C";

let c=document.getElementById("caldaia");

if(d.caldaia){
c.innerHTML="ACCESA";
c.className="value on";
}else{
c.innerHTML="SPENTA";
c.className="value off";
}

if(!init){
document.getElementById("on").value=d.on;
document.getElementById("off").value=d.off;
init=true;
}
});

/* INVIO SOGLIE */
function invia(){

let on=document.getElementById("on").value;
let off=document.getElementById("off").value;

client.publish("casa/caldera/comandi","ON:"+on);
client.publish("casa/caldera/comandi","OFF:"+off);

let m=document.getElementById("msg");
m.innerHTML="Soglie inviate ✅";
m.style.color="#2ecc71";

setTimeout(()=>{ m.innerHTML=""; },3000);
}

/* OROLOGIO */
setInterval(()=>{
document.getElementById("clock").innerHTML=new Date().toLocaleTimeString();
},1000);

/* WIFI */
setInterval(()=>{
let w=document.getElementById("wifi");

if(Date.now()-last<10000){
w.innerHTML="WiFi connected";
w.className="wifi-ok";
}else{
w.innerHTML="WiFi disconnected";
w.className="wifi-off";
}
},2000);

</script>

</body>
</html>
